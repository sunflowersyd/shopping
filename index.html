<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sydney's Wish List</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="sidebar">
    <h3>Categories</h3>

    <a href="#clothing-accessories">Clothing/Accessories</a>
    <a href="#tech">Tech</a>
    <a href="#decor">Decor</a>
    <a href="#gaming">Gaming</a>
    <a href="#books">Books</a>
</nav>

<main class="content-wrapper">
    <header>
        <h1>Wish List</h1>
        <p>Things I hope to buy someday! 💖</p>
    </header>

    <div class="search-bar">
        <input id="wishlist-search" type="text" placeholder="Search wishlist by name..." aria-label="Search wishlist items">
    </div>

    <section class="add-item-card" aria-label="Add new wishlist item">
        <h2>Add New Item</h2>
        <form id="add-item-form" class="add-item-form">
            <div class="form-grid">
                <div class="form-group">
                    <label for="item-name">Item Name</label>
                    <input id="item-name" name="title" type="text" placeholder="Enter item name" required>
                </div>
                <div class="form-group">
                    <label for="item-price">Price</label>
                    <input id="item-price" name="price" type="text" placeholder="e.g. $24.95" required>
                </div>
            </div>

            <div class="form-group">
                <label for="item-description">Description</label>
                <textarea id="item-description" name="description" rows="3" placeholder="Describe the item" required></textarea>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label for="item-category">Category</label>
                    <select id="item-category" name="category" required>
                        <option value="">Choose a category</option>
                        <option value="clothing-accessories">Clothing/Accessories</option>
                        <option value="tech">Tech</option>
                        <option value="decor">Decor</option>
                        <option value="gaming">Gaming</option>
                        <option value="books">Books</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="item-image">Image URL</label>
                    <input id="item-image" name="image" type="url" placeholder="https://example.com/image.jpg">
                </div>
            </div>

            <div class="form-group">
                <label for="item-url">Store Link</label>
                <input id="item-url" name="url" type="url" placeholder="https://example.com/store">
            </div>

            <button type="submit">Add Item</button>
        </form>
    </section>

    <section id="items"></section>
</main>

    <script src="script.js"></script>
    
</body>
</html>
